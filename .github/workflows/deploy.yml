name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync code to VPS
        run: |
          rsync -az --delete \
            --exclude='.git/' --exclude='.github/' --exclude='node_modules/' \
            --exclude='.env' --exclude='data/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/impress3d-bot/"

      - name: Install deps & restart service
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
              set -e
              cd /opt/impress3d-bot
              npm ci --omit=dev --no-audit --no-fund
              systemctl restart impress3d-bot
              sleep 2
              systemctl is-active impress3d-bot
            '
